# =========================================================
# apache-nexusbank.conf  -  Virtual host for NexusBank
# =========================================================

<VirtualHost *:80>
    ServerName nexusbank.local
    DocumentRoot /var/www/nexusbank

    # ── Static assets (CSS, images, fonts) ───────────────
    <Directory /var/www/nexusbank>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Cache CSS/images aggressively
        <FilesMatch "\.(css|png|jpg|ico|woff2)$">
            Header set Cache-Control "public, max-age=86400"
        </FilesMatch>
    </Directory>

    # ── CGI scripts ───────────────────────────────────────
    ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/nexusbank/

    <Directory /usr/lib/cgi-bin/nexusbank>
        Options +ExecCGI
        AddHandler cgi-script .cgi
        Require all granted
    </Directory>

    # ── Friendly URLs (remove .cgi extension) ─────────────
    RewriteEngine On

    # Home
    RewriteRule ^/?$                /cgi-bin/home.cgi   [PT,L]

    # Public pages
    RewriteRule ^/login/?$          /cgi-bin/login.cgi       [PT,L]
    RewriteRule ^/activate/?$       /cgi-bin/activate.cgi    [PT,L]
    RewriteRule ^/forgot/?$         /cgi-bin/forgot.cgi      [PT,L]

    # Protected pages
    RewriteRule ^/dashboard/?$      /cgi-bin/dashboard.cgi   [PT,L]
    RewriteRule ^/transfer/?$       /cgi-bin/transfer.cgi    [PT,L]
    RewriteRule ^/transactions/?$   /cgi-bin/transactions.cgi [PT,L]
    RewriteRule ^/cards/?$          /cgi-bin/cards.cgi       [PT,L]
    RewriteRule ^/loans/?$          /cgi-bin/loans.cgi       [PT,L]
    RewriteRule ^/services/?$       /cgi-bin/services.cgi    [PT,L]
    RewriteRule ^/calculator/?$     /cgi-bin/calculator.cgi  [PT,L]
    RewriteRule ^/profile/?$        /cgi-bin/profile.cgi     [PT,L]
    RewriteRule ^/logout/?$         /cgi-bin/logout.cgi      [PT,L]

    # ── Logging ───────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/nexusbank-error.log
    CustomLog ${APACHE_LOG_DIR}/nexusbank-access.log combined
</VirtualHost>
