# =========================================================
# docker-compose.yml  -  NexusBank full stack
#
# Services:
#   mysql         → internal only (port 3306)
#   rust-backend  → internal only (port 8080)
#   apache-cgi    → public       (port 80)
#
# Usage:
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose down
# =========================================================

version: "3.9"

services:

  # ── MySQL database ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: nexusbank-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nexusroot2024
      MYSQL_DATABASE:      nexusbank
      MYSQL_USER:          nexusapp
      MYSQL_PASSWORD:      nexusapp2024
    volumes:
      # auto-run schema + seed on first boot
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      # persist data between restarts
      - mysql_data:/var/lib/mysql
    networks:
      - nexusnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nexusapp", "-pnexusapp2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Rust backend ────────────────────────────────────────
  rust-backend:
    build:
      context: .
      dockerfile: Dockerfile.rust
    container_name: nexusbank-rust
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://nexusapp:nexusapp2024@mysql:3306/nexusbank
      RUST_LOG:     info
      SERVER_HOST:  0.0.0.0
      SERVER_PORT:  "8080"
    networks:
      - nexusnet
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Apache + C CGI frontend ─────────────────────────────
  apache-cgi:
    build:
      context: .
      dockerfile: Dockerfile.cgi
    container_name: nexusbank-apache
    restart: unless-stopped
    environment:
      # CGI scripts read this to reach the Rust backend
      RUST_BACKEND_URL: http://rust-backend:8080
    ports:
      - "80:80"
    networks:
      - nexusnet
    depends_on:
      rust-backend:
        condition: service_healthy

# ── Shared network ──────────────────────────────────────
networks:
  nexusnet:
    driver: bridge

# ── Named volumes ───────────────────────────────────────
volumes:
  mysql_data:
